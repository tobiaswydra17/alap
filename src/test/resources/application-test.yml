spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/alap_test
    username: alap_user
    password: alap_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

alap:
  dedup:
    secret: ${ALAP_DEDUP_SECRET:super-secret-dedup-key-change-me}

app:
  seed:
    enabled: false