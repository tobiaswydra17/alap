spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/alap
    username: alap_user
    password: alap_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080