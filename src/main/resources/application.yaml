spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/alap
    username: alap_user
    password: alap_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

alap:
  dedup:
    secret: ${ALAP_DEDUP_SECRET:super-secret-dedup-key-change-me}

server:
  port: 8080