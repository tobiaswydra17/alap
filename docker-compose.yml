services:
  postgres:
    image: postgres:16
    container_name: alap-postgres
    environment:
      POSTGRES_DB: alap
      POSTGRES_USER: alap_user
      POSTGRES_PASSWORD: alap_password
    ports:
      - "5432:5432"
    volumes:
      - alap_postgres_data:/var/lib/postgresql/data

volumes:
  alap_postgres_data: